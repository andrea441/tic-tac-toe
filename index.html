<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic-Tac-Toe</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <h1>Tic-Tac-Toe</h1>
      <div class="header-buttons">
        <button type="button" class="change-names-btn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <title>swap-horizontal</title>
            <path d="M21,9L17,5V8H10V10H17V13M7,11L3,15L7,19V16H14V14H7V11Z" />
          </svg>
          Change Players
        </button>
        <button type="button" class="restart-game-btn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <title>restart</title>
            <path
              d="M12,4C14.1,4 16.1,4.8 17.6,6.3C20.7,9.4 20.7,14.5 17.6,17.6C15.8,19.5 13.3,20.2 10.9,19.9L11.4,17.9C13.1,18.1 14.9,17.5 16.2,16.2C18.5,13.9 18.5,10.1 16.2,7.7C15.1,6.6 13.5,6 12,6V10.6L7,5.6L12,0.6V4M6.3,17.6C3.7,15 3.3,11 5.1,7.9L6.6,9.4C5.5,11.6 5.9,14.4 7.8,16.2C8.3,16.7 8.9,17.1 9.6,17.4L9,19.4C8,19 7.1,18.4 6.3,17.6Z"
            />
          </svg>
          Restart Game
        </button>
      </div>
    </header>
    <main>
      <span class="current-player"></span>
      <div class="board">
        <div class="cell" data-id="1"></div>
        <div class="cell" data-id="2"></div>
        <div class="cell" data-id="3"></div>
        <div class="cell" data-id="4"></div>
        <div class="cell" data-id="5"></div>
        <div class="cell" data-id="6"></div>
        <div class="cell" data-id="7"></div>
        <div class="cell" data-id="8"></div>
        <div class="cell" data-id="9"></div>
      </div>
    </main>
    <dialog id="modal-change-names">
      <form action="">
        <div>
          <label for="player-1-name">Player 1 Name:</label>
          <input type="text" name="player-1" id="player-1-name" />
        </div>
        <div>
          <label for="player-2-name">Player 2 Name: </label>
          <input type="text" name="player-2" id="player-2-name" />
        </div>
        <button type="submit">Accept</button>
      </form>
    </dialog>
    <dialog id="modal-win-message">
      <span class="message"></span>
      <button type="button" id="close-modal">Accept</button>
    </dialog>
  </body>
</html>
